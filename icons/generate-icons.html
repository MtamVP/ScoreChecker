<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>ScoreChecker — Tạo Icons</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0b0c10;
      color: #F1F5F9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fcfcfc;
    }
    p {
      font-size: 14px;
      color: #8b92a5;
      max-width: 400px;
      text-align: center;
      line-height: 1.6;
    }
    .previews {
      display: flex;
      gap: 32px;
      align-items: flex-end;
      margin-top: 20px;
    }
    .preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .preview canvas {
      border: 1px solid #2d3340;
      border-radius: 8px;
    }
    .preview span {
      font-size: 12px;
      color: #8b92a5;
    }
    .status {
      font-size: 15px;
      color: #ff6b35;
      font-weight: 600;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Tạo Logo Premium ScoreChecker</h1>
  <p>Hãy chờ 3 giây, ứng dụng sẽ <b>tự động tải xuống</b> bộ Icon Cam Neon mới nhất.<br>Sau đó bạn hãy chép đè chúng vào thư mục <code>icons/</code> và tải lại Extension nhé!</p>
  <div class="previews" id="previews"></div>
  <p class="status" id="status">Đang vẽ Logo...</p>

  <script>
    const sizes = [16, 48, 128];
    const previewsEl = document.getElementById('previews');
    const statusEl = document.getElementById('status');

    function generateIcon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const r = size * 0.22;

      // Nền Obsidian nhám
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = '#0b0c10';
      ctx.fill();

      // Vẽ chữ S Neon
      const scale = size / 128;
      ctx.save();
      ctx.scale(scale, scale);

      const grad = ctx.createLinearGradient(0, 0, 128, 128);
      grad.addColorStop(0, '#ff6b35');
      grad.addColorStop(1, '#f53844');

      const p = new Path2D("M82,34 L46,34 C38,34 32,40 32,48 L32,56 C32,64 38,70 46,70 L72,70 C76.4,70 80,73.6 80,78 L80,84 C80,88.4 76.4,92 72,92 L46,92 L46,104 L72,104 C80.8,104 88,96.8 88,88 L88,78 C88,69.2 80.8,62 72,62 L46,62 C41.6,62 38,58.4 38,54 L38,48 C38,43.6 41.6,40 46,40 L82,40 L82,34 Z");
      ctx.fillStyle = grad;
      // Shadow cho size lớn
      if (size >= 48) {
        ctx.shadowColor = 'rgba(255, 107, 53, 0.4)';
        ctx.shadowBlur = 10;
      }
      ctx.fill(p);
      ctx.restore();

      return canvas;
    }

    function downloadCanvas(canvas, filename) {
      return new Promise((resolve) => {
        canvas.toBlob((blob) => {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => {
            URL.revokeObjectURL(url);
            resolve();
          }, 300);
        }, 'image/png');
      });
    }

    async function main() {
      const downloads = [];

      for (const size of sizes) {
        const canvas = generateIcon(size);

        // Show preview
        const wrap = document.createElement('div');
        wrap.className = 'preview';

        const previewCanvas = document.createElement('canvas');
        previewCanvas.width = Math.max(size, 48);
        previewCanvas.height = Math.max(size, 48);
        const pCtx = previewCanvas.getContext('2d');
        const offset = (Math.max(size, 48) - size) / 2;
        pCtx.drawImage(canvas, offset, offset);
        wrap.appendChild(previewCanvas);

        const label = document.createElement('span');
        label.textContent = `icon${size}.png`;
        wrap.appendChild(label);

        previewsEl.appendChild(wrap);

        downloads.push({ canvas, filename: `icon${size}.png` });
      }

      // Download
      for (let i = 0; i < downloads.length; i++) {
        await new Promise((r) => setTimeout(r, 600));
        await downloadCanvas(downloads[i].canvas, downloads[i].filename);
      }

      statusEl.innerHTML = '✓ Đã tải xong Icon Premium S Neon!<br/>Mở thư mục Downloads, chép đè nó vào thư mục icons/ nhé.';
    }

    // Tự động chạy
    main();
  </script>
</body>
</html>
