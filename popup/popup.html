<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>ScoreChecker DGNL Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- Ambient background lighting for Glassmorphism -->
  <div class="ambient-glow"></div>

  <!-- Nút Cài đặt (Bánh răng) -->
  <button id="btn-settings" class="btn-settings" title="Cài đặt">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="3"></circle>
      <path
        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
      </path>
    </svg>
  </button>

  <main class="glass-card">
    <!-- Màn hình Đăng Nhập -->
    <div id="screen-login" class="screen full-center">
      <div class="logo-wrapper">
        <img src="../icons/icon128.png" alt="Logo" class="main-logo" />
      </div>
      <div class="brand-title">ScoreChecker</div>

      <div class="login-box">
        <div class="tabs-container">
          <div class="tab-bg"></div>
          <button class="tab-pill active" id="tab-fast">Tra cứu Nhanh</button>
          <button class="tab-pill" id="tab-slow">Tra cứu bằng tài khoản</button>
        </div>

        <div class="input-group" id="group-session">
          <select id="input-session" class="input-dropdown">
            <option value="">Đang tải danh sách đợt thi...</option>
          </select>
        </div>

        <div class="input-group">
          <input type="text" id="input-cccd" placeholder="Số Thẻ Căn Cước/CCCD (Bắt buộc)" maxlength="12"
            autocomplete="off" />
        </div>

        <!-- Field riêng cho Tab: Nhanh -->
        <div class="input-group" id="group-email">
          <input type="email" id="input-email" placeholder="Email dự thi" autocomplete="off" />
        </div>

        <!-- Field riêng cho Tab: Chậm -->
        <div class="input-group hidden" id="group-password">
          <input type="password" id="input-password" placeholder="Mật khẩu tài khoản ĐGNL" autocomplete="off" />
        </div>

        <button id="btn-login-main" class="btn-primary"><span id="btn-login-txt">Tra cứu</span></button>

        <div class="or-separator"><span>HOẶC</span></div>

        <button id="btn-google-login" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#34A853"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#FBBC05"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          Google
        </button>
      </div>
      <div id="login-error" class="login-error hidden"></div>
    </div>

    <!-- Màn hình Đang Tải -->
    <div id="screen-loading" class="screen full-center hidden">
      <div class="neo-spinner"></div>
      <p class="status-msg">Đang kết nối hệ thống...</p>
    </div>

    <!-- Màn hình Kết Quả -->
    <div id="screen-result" class="screen result-wrapper hidden">
      <div class="score-container">
        <div id="student-name" class="student-name">Thí Sinh</div>

        <!-- Score number wrapped for drag-reveal -->
        <div class="score-reveal-wrap">
          <div class="score-number-wrap">
            <div class="score-number" id="score-total">--</div>
            <div class="score-max">/1200</div>
          </div>
          <!-- Cloud overlay: drag left→right to reveal -->
          <div class="cloud-mask-total" id="cloud-total"></div>
        </div>

        <p class="drag-hint">← Kéo sang phải để nặn điểm →</p>
        <button class="btn-reveal-all" id="btn-reveal-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Bật tung!
        </button>
      </div>

      <div id="score-sections" class="score-sections hidden">
        <!-- Rendered by JS -->
      </div>

      <div class="action-row">
        <button id="btn-refresh" class="btn-ghost">Làm mới</button>
        <button id="btn-logout" class="btn-ghost danger">Đăng xuất</button>
      </div>
    </div>

  </main>

  <!-- Modal Cài đặt -->
  <div id="settings-modal" class="modal hidden">
    <div class="modal-glass">
      <div class="modal-header">
        <h3>Tuỳ chỉnh nhanh</h3>
        <button id="btn-close-settings" class="btn-close">×</button>
      </div>
      <div class="modal-body">

        <div class="setting-group">
          <div class="sg-title">
            <span>Auto Refresh</span>
            <label class="toggle-switch">
              <input type="checkbox" id="watch-toggle">
              <span class="slider"></span>
            </label>
          </div>
          <div class="watch-options" id="interval-btns">
            <button class="iv active" data-minutes="2">2p</button>
            <button class="iv" data-minutes="5">5p</button>
            <button class="iv" data-minutes="10">10p</button>
          </div>
        </div>

        <div class="setting-group">
          <div class="sg-title">
            <span>Discord Webhook</span>
            <label class="toggle-switch">
              <input type="checkbox" id="discord-toggle">
              <span class="slider"></span>
            </label>
          </div>
          <input type="text" id="input-webhook" class="input-webhook"
            placeholder="https://discord.com/api/webhooks/..." />
          <button id="btn-discord-save" class="btn-small">Lưu trạng thái</button>
        </div>

        <div class="setting-group">
          <div class="sg-title">
            <span>Hồi hộp time</span>
            <label class="toggle-switch">
              <input type="checkbox" id="surprise-toggle">
              <span class="slider"></span>
            </label>
          </div>
          <p style="font-size:12px; color: var(--text-muted); margin-top: -8px;">Che điểm — kéo hoặc bấm nút để hé lộ dần</p>
        </div>

      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
